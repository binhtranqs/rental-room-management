spring.application.name=rental

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/rental_room_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}

spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

spring.data.redis.host=${SPRING_DATA_REDIS_HOST:localhost}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT:6379}

app.jwt.secret=${APP_JWT_SECRET:change-this-secret-key-change-this-secret-key}
app.jwt.expiration-ms=${APP_JWT_EXPIRATION_MS:86400000}
app.rate-limit.enabled=${APP_RATE_LIMIT_ENABLED:true}
