spring.application.name=rental
server.port=${PORT:8080}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/rental_room_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}

spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

spring.data.redis.host=${SPRING_DATA_REDIS_HOST:localhost}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT:6379}
spring.data.redis.repositories.enabled=false

app.jwt.secret=${APP_JWT_SECRET:change-this-secret-key-change-this-secret-key}
app.jwt.expiration-ms=${APP_JWT_EXPIRATION_MS:86400000}
app.rate-limit.enabled=${APP_RATE_LIMIT_ENABLED:true}
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173}

app.momo.endpoint=${APP_MOMO_ENDPOINT:https://test-payment.momo.vn/v2/gateway/api/create}
app.momo.partner-code=${APP_MOMO_PARTNER_CODE:}
app.momo.access-key=${APP_MOMO_ACCESS_KEY:}
app.momo.secret-key=${APP_MOMO_SECRET_KEY:}
app.momo.redirect-url=${APP_MOMO_REDIRECT_URL:http://localhost:5173/tenant/bills}
app.momo.ipn-url=${APP_MOMO_IPN_URL:http://localhost:8080/payments/momo/ipn}
